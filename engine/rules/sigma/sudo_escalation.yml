title: Sudo Privilege Escalation
description: Detects sudo command execution attempts which may indicate privilege escalation
status: stable
logsource:
    category: process_creation
    product: linux
detection:
    selection:
        process_name:
            - sudo
            - su
            - pkexec
            - doas
    condition: selection
level: medium
tags:
    - attack.privilege_escalation
    - attack.t1548
