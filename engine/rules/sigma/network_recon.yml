title: Suspicious Network Reconnaissance
description: Detects common network enumeration and scanning tools
status: stable
logsource:
    category: process_creation
detection:
    selection:
        process_name:
            - nmap
            - masscan
            - zmap
            - netcat
            - nc
            - ncat
        message:
            - "*nmap*"
            - "*masscan*"
            - "*netstat*"
            - "*ss -tulnp*"
    condition: selection
level: high
tags:
    - attack.discovery
    - attack.t1046
